<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Register — LibraryMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<div class="auth-bg">

  <div class="glass-card" style="max-width:480px">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fas fa-user-graduate"></i></div>
      <div class="auth-logo-text">Library<span>MS</span></div>
    </div>

    <h2 class="auth-title">Create account</h2>
    <p class="auth-subtitle">Register as a student to access the library</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" name="name" class="form-control"
                   placeholder="Nikhilesh shetty" required autocomplete="name"/>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" name="email" class="form-control"
                   placeholder="nikhilesh@example.com" required autocomplete="email"/>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label">Phone Number <span style="color:var(--text-muted)">(optional)</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-phone"></i></span>
            <input type="tel" name="phone" class="form-control" placeholder="+91 9000 000 000"/>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" id="password" class="form-control"
                   placeholder="Min. 6 characters" required autocomplete="new-password"/>
          </div>
          <!-- Strength bar -->
          <div style="height:3px; background:var(--border); border-radius:99px; margin-top:.4rem; overflow:hidden;">
            <div id="pwStrengthBar" style="height:100%; width:0; border-radius:99px; transition:width .3s, background .3s;"></div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg mt-4">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center mb-0" style="font-size:.83rem; color:var(--text-secondary)">
      Already have an account?
      <a href="{{ url_for('login') }}" class="fw-600">Sign In</a>
    </p>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
