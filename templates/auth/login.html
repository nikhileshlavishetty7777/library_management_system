<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — LibraryMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<div class="auth-bg">

  <div class="glass-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fas fa-book-open"></i></div>
      <div class="auth-logo-text">Library<span>MS</span></div>
    </div>

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your library account</p>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
            <i class="fas fa-info-circle me-1"></i> {{ message }}
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" name="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email"/>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" id="loginPw" class="form-control"
                 placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" class="input-group-text" id="togglePw" style="cursor:pointer">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center mb-0" style="font-size:.83rem; color:var(--text-secondary)">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="fw-600">Register as Student</a>
    </p>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
  const togglePw = document.getElementById('togglePw');
  const loginPw  = document.getElementById('loginPw');
  const eyeIcon  = document.getElementById('eyeIcon');
  if (togglePw) {
    togglePw.addEventListener('click', () => {
      const isText = loginPw.type === 'text';
      loginPw.type = isText ? 'password' : 'text';
      eyeIcon.className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
    });
  }
</script>
</body>
</html>
