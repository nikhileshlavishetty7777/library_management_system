{% extends "base.html" %}
{% block title %}{{ action }} User{% endblock %}
{% block topbar_title %}<span>{{ action }} User</span><small>User management</small>{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">
      <i class="fas fa-user-{% if action=='Add' %}plus{% else %}edit{% endif %} me-2" style="color:var(--accent)"></i>
      {{ action }} User
    </h1>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('admin_users') }}">Users</a></li>
        <li class="breadcrumb-item active">{{ action }}</li>
      </ol>
    </nav>
  </div>
  <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-2"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">
        <h5><i class="fas fa-user"></i> User Details</h5>
      </div>
      <div class="card-body">
        <form method="POST" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control"
                     placeholder="Full name" required
                     value="{{ user.name if user else '' }}"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="tel" name="phone" class="form-control"
                     placeholder="+91 9000 000 000"
                     value="{{ user.phone if user else '' }}"/>
            </div>

            <div class="col-md-7">
              <label class="form-label">Email <span class="text-danger">*</span></label>
              <input type="email" name="email" class="form-control"
                     placeholder="email@example.com" required
                     value="{{ user.email if user else '' }}"/>
            </div>
            <div class="col-md-5">
              <label class="form-label">Role <span class="text-danger">*</span></label>
              <select name="role" class="form-select" required>
                <option value="student"   {% if user and user.role=='student' %}selected{% endif %}>Student</option>
                <option value="librarian" {% if user and user.role=='librarian' %}selected{% endif %}>Librarian</option>
                <option value="admin"     {% if user and user.role=='admin' %}selected{% endif %}>Admin</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">
                Password
                {% if action == 'Edit' %}
                <small style="color:var(--text-muted); font-weight:400">(leave blank to keep current)</small>
                {% else %}
                <span class="text-danger">*</span>
                {% endif %}
              </label>
              <input type="password" name="password" id="password" class="form-control"
                     placeholder="{% if action=='Add' %}Min. 6 characters{% else %}New password (optional){% endif %}"
                     {% if action=='Add' %}required{% endif %}/>
              <div style="height:3px; background:var(--border); border-radius:99px; margin-top:.4rem; overflow:hidden;">
                <div id="pwStrengthBar" style="height:100%; width:0; border-radius:99px; transition:width .3s, background .3s;"></div>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-2"></i>{{ action }} User
            </button>
            <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">
              <i class="fas fa-times me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
