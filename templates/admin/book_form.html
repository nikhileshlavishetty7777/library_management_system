{% extends "base.html" %}
{% block title %}{{ action }} Book{% endblock %}
{% block topbar_title %}<span>{{ action }} Book</span><small>Book catalogue management</small>{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">
      <i class="fas fa-{% if action=='Add' %}plus-circle{% else %}edit{% endif %} me-2" style="color:var(--accent)"></i>
      {{ action }} Book
    </h1>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('admin_books') }}">Books</a></li>
        <li class="breadcrumb-item active">{{ action }}</li>
      </ol>
    </nav>
  </div>
  <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-2"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header">
        <h5><i class="fas fa-book"></i> Book Details</h5>
      </div>
      <div class="card-body">
        <form method="POST" novalidate>
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Title <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control"
                     placeholder="Enter book title" required
                     value="{{ book.title if book else '' }}"/>
            </div>
            <div class="col-md-4">
              <label class="form-label">Year Published</label>
              <input type="number" name="year" class="form-control"
                     placeholder="2024" min="1000" max="2099"
                     value="{{ book.year if book else '' }}"/>
            </div>

            <div class="col-md-6">
              <label class="form-label">Author <span class="text-danger">*</span></label>
              <input type="text" name="author" class="form-control"
                     placeholder="Author name" required
                     value="{{ book.author if book else '' }}"/>
            </div>
            <div class="col-md-6">
              <label class="form-label">Publisher</label>
              <input type="text" name="publisher" class="form-control"
                     placeholder="Publisher name"
                     value="{{ book.publisher if book else '' }}"/>
            </div>

            <div class="col-md-6">
              <label class="form-label">Category <span class="text-danger">*</span></label>
              <select name="category" class="form-select" required>
                <option value="">Select category…</option>
                {% set cats = ['Fiction','Non-Fiction','Technology','Science','History',
                               'Self-Help','Biography','Psychology','Philosophy',
                               'Mathematics','Literature','Art','Business','Other'] %}
                {% for c in cats %}
                  <option value="{{ c }}" {% if book and book.category==c %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">ISBN</label>
              <input type="text" name="isbn" class="form-control"
                     placeholder="978-0-000-00000-0"
                     value="{{ book.isbn if book else '' }}"/>
            </div>

            <div class="col-md-4">
              <label class="form-label">Total Quantity <span class="text-danger">*</span></label>
              <input type="number" name="quantity" class="form-control"
                     min="1" placeholder="1" required
                     value="{{ book.quantity if book else 1 }}"/>
            </div>

            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="3"
                        placeholder="Brief description of the book…">{{ book.description if book else '' }}</textarea>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-2"></i>{{ action }} Book
            </button>
            <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">
              <i class="fas fa-times me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
